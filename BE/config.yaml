database:
  # host: localhost
  host: 14.225.212.86
  port: 5432
  name: cuchum_db
  user: cuchum_admin
  password: Tsnn@123
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

jwt:
  secret: cuchumsecretkey
  access_expire_hours: 6
  refresh_expire_days: 30

upload:
  path: Media
  max_size: 10485760 # 10MB in bytes
  allowed_types:
    - image/jpeg
    - image/png
    - image/jpg
    - application/pdf

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
    - HEAD
  allow_headers:
    - Origin
    - Content-Type
    - Content-Length
    - Accept
    - Accept-Encoding
    - Accept-Language
    - Authorization
    - X-Requested-With
    - X-CSRF-Token
    - Cache-Control
    - X-API-Key
  expose_headers:
    - Content-Length
    - Content-Type
  allow_credentials: true
  max_age: 86400 # 24 hours

email:
  host: smtp.gmail.com
  port: 465
  username: your-email@gmail.com
  password: your-app-password
  from_name: CH_APP
  otp_expire_minutes: 5

fuel_prices:
  petrolimex_url: "https://portals.petrolimex.com.vn/~apis/portals/cms.item/search?object-identity=search&x-"
  pvoil_url: "https://www.pvoil.com.vn/"
